<div id="item-{{.ID}}">
  <form hx-put="/item/{{.UserID}}/{{.ID}}"
        hx-target="#item-{{.ID}}"
        hx-swap="outerHTML">
    <input type="text" name="item" value="{{.Item}}">
    <input type="text" name="location" value="{{.Location}}">
    <button type="submit">Save</button>
    <button hx-get="/item/{{.UserID}}/{{.ID}}">Cancel</button>
  </form>
</div>
